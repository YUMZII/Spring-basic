<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>연산할 두개의 숫자를 입력하고 연산자를 선택하시오.</h1>
<hr>
<form action="/calc" method="get">
    <input type="number" name="num1" required placeholder="숫자를 입력하세요">
    <select name="oper">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="/">/</option>
        <option value="*">*</option>
    </select>
    <input type="number" name="num2" required placeholder="숫자를 입력하세요">
    <button type="submit">계산하기</button>
</form>
</body>
</html>
